version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
      POSTGRES_DB: assetflow
    ports:
      - "5432:5432"
    volumes:
      - assetflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: "postgresql://assetflow:assetflow@db:5432/assetflow?schema=public"
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRES_IN: "7d"
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: "http://localhost:5000/api/v1"
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  assetflow_pgdata:
